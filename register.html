<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Spice Dubai</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* HEADER */
.header {
  width: calc(96% - 1px); /* 8px + 8px */
  margin: 8px auto 0;        /* kéo xuống */
  background: #000000;
  border-bottom: 0px solid #ddd;
  height: 68px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 1 23px;

  border-radius: 0;           /* ❌ bỏ bo góc -> vuông */
}

.header-container {
  max-width: 1200px;
  margin: 30px auto;
  margin-left: 240px;
  width: 100%;
  padding: 0 25px;
transform: translateX(-30px) !important;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transform: translateX(-5px);
  padding: 0 70px;
}
/* LOGO */
.logo img {
  width: 160px; /* 👈 tăng size */

  transform: scale(1.2.1); /* 👈 phóng to nhưng không làm layout đổi */
  transform-origin: left center; /* giữ lệch chuẩn */
transform: translate(-50px, -1px) !important;
  display: block;
}
.menu {
  display: flex;
  margin-top: 2px;
  margin-left: -9.5px;
  gap: 49.5px;
  transform: translate(-4.5px, -1px);
}

.menu a {
  font-family: 'Playfair Display', serif; /* 🔥 font anna */
  font-size: 18.5px; /* 👈 size chuẩn anna */
  font-weight: 600;

  letter-spacing: 0.3px; /* 👈 chữ thoáng nhẹ */
  
  text-decoration: none;
  color: #222;

  position: relative;
  transition: 0.3s;
}

.menu a:hover {
  color: #e91e63;
}
.menu a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -6px;

  width: 0%;
  height: 2px;
  background: #e91e63;

  transition: 0.3s;
}

.menu a:hover::after {
  width: 100%;
}
.auth {
  display: flex;
  gap: 10px;
  margin-left:0px;
  align-items: center;
  position: relative;
left: 35px;
transform: translate(-6px, 0px); /* 👈 thêm dòng này */
}
.auth a {
  padding: 7.5px 17.2px;
  border-radius: 999px;

  font-family: 'Playfair Display', serif; /* 👈 CHUẨN ANNA */
  font-size: 15px;
  font-weight: 600;

  letter-spacing: 0.5px;
  color: #fff;
  text-decoration: none;

  /* nhẹ thôi cho sang */
  box-shadow: 0 1px 6px rgba(0,0,0,0.2);

  transition: 0.25s;
}

/* REGISTER */
.register {
  background: linear-gradient(45deg, #ffb300, #ff8f00);
}

/* LOGIN */
.login {
  background: linear-gradient(45deg, #ff3d00, #ff1744);
}

.auth a:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.25);
  filter: brightness(1.05);
}

/* DEMO CONTENT */
.content {
  padding: 50px;
  font-size: 22px;
}
.back-btn {
  display: inline-block;
padding: 10px 0;     /* 👈 bỏ padding ngang */
  margin-top: 15px;
  margin-left: 273px;

  padding: 7px 15px;

  background: #e91e63;
  color: #fff;

  border-radius: 9px;
  text-decoration: none;
  font-size: 20px;
  font-weight: 500;
  font-family: 'Playfair Display', serif;

  /* 🔥 VIỀN + HIỆU ỨNG */
  border: 1px solid rgba(255,255,255,0.3);

  box-shadow: 
    0 4px 10px rgba(0,0,0,0.2),          /* bóng dưới */
    inset 0 1px 0 rgba(255,255,255,0.3); /* ánh sáng trên */

  transition: all 0.25s ease;
}
.back-btn:active {
  transform: translateY(1px) scale(0.97); /* 👇 nhấn xuống */

  box-shadow: 
    0 3px 6px rgba(0,0,0,0.3),
    inset 0 2px 4px rgba(0,0,0,0.2);
}
.back-btn:hover {
  transform: translateY(-2px); /* 👈 nổi lên */

  filter: brightness(1.1); /* 👈 màu nhạt hơn */

  box-shadow: 0 8px 18px rgba(0,0,0,0.3);
}
/* ===== FIX LOGO IMAGE ===== */
.logo img {
  width: 177px;        /* chỉnh size logo */
  height: auto;
  filter: brightness(1.2) contrast(1.1);
  transition: 0.3s;
}

/* hover xịn */
.logo img:hover {
  transform: scale(1.05);
  filter: brightness(1.3) drop-shadow(0 0 10px #ff4da6);
}
header a,
.menu a,
.nav a,
.header a {
  color: #fff !important;
}
header a:hover,
.menu a:hover,
.nav a:hover,
.header a:hover {
  color: #ff4da6 !important;
}
.header {
  background: #000;
  padding: 5px 30px; /* tăng chiều cao khung */
  display: flex;
  align-items: center; /* căn giữa logo + menu */
}
.auth a,
.auth a:link,
.auth a:visited,
.auth a:hover,
.auth a:active,
.auth a:focus {
  color: #fff !important;
  text-decoration: none !important;
}
.register-container {
  text-align: center;
  margin-top: 40px;
}

.register-container h1 {
  font-size: 40px;
  margin-bottom: 30px;
}

.form-box {
  width: 400px;
  margin: auto;
  background: #f5f5f5;
  padding: 30px;
  border-radius: 15px;
  text-align: left;
}

.form-box label {
  display: block;
  margin-top: 15px;
  font-weight: 500;
}

.form-box input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.btn-register {
  margin-top: 20px;
  padding: 12px;
  width: 160px;
  border: none;
  border-radius: 25px;

  background: linear-gradient(45deg, #ff00cc, #7b00ff);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn-register:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.form-box p {
  margin-top: 15px;
}

.form-box a {
  color: #e91e63;
  font-weight: bold;
  text-decoration: none;
}
.form-box {
  width: 500px;          /* 👈 to hơn (trước 400px) */
  margin: 0 auto;        /* 👈 căn giữa chuẩn */

  background: #f5f5f5;
  padding: 40px;         /* 👈 tăng padding cho đều 2 bên */
  border-radius: 15px;

  text-align: left;
  box-sizing: border-box; /* 👈 QUAN TRỌNG tránh lệch */
}
.form-box input {
  width: 100%;
  padding: 12px; /* 👈 to hơn */
  margin-top: 5px;

  border-radius: 8px;
  border: 1px solid #ccc;

  box-sizing: border-box; /* 👈 fix tràn lề phải */
}
</style>

</head>

<body>
<div class="header">
    <div class="header-container">

        <div class="logo">
            <img src="logo.png">
        </div>

        <div class="menu">
            <a href="index.html">Home</a>
            <a href="#">Escorts</a>
            <a href="#">Agencies</a>
            <a href="reviews.html">Escort Reviews</a>
            <a href="#">Contact</a>
        </div>

        <div class="auth">
            <a href="#" class="register">Register</a>
            <a href="#" class="login">Login</a>
        </div>

    </div>
</div>

<!-- 🔥 ĐẶT Ở ĐÂY (NGOÀI HEADER) -->
<div class="back-wrapper">
    <a href="index.html" class="back-btn">← Back to search</a>
</div>
<div class="register-container">
  <h1>Register</h1>

  <div class="form-box">
    <label>Username</label>
    <input type="text">

    <label>Email</label>
    <input type="email">

    <label>Password</label>
    <input type="password">

    <label>Confirm Password</label>
    <input type="password">

    <button class="btn-register" onclick="register()">REGISTER</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>
<div style="height: 2000px;"></div>
 <script>
function register() {
  let username = document.querySelector("input[type='text']").value;
  let email = document.querySelector("input[type='email']").value;
  let password = document.querySelectorAll("input[type='password']")[0].value;
  let confirm = document.querySelectorAll("input[type='password']")[1].value;

  if (!username || !email || !password || !confirm) {
    alert("Please fill all fields!");
    return;
  }

  if (password !== confirm) {
    alert("Passwords do not match!");
    return;
  }

  let user = { username, email, password };

  let users = JSON.parse(localStorage.getItem("users")) || [];
  users.push(user);

  localStorage.setItem("users", JSON.stringify(users));

let url = "https://script.google.com/macros/s/AKfycbwAls4BFdM00BOqaOvs3DUQmnJh9oIeSujS5Bjhr8OnCczV5XXZg8mMNMXT4lWg-gvnFg/exec";

fetch(url, {
  method: "POST",
  mode: "no-cors", // 🔥 THÊM DÒNG NÀY
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    username,
    email,
    password
  })
})
.then(() => {
  alert("Register success!");
  window.location.href = "login.html";
})
.catch(() => {
  alert("Lỗi gửi dữ liệu!");
});
}
</script>
</body>
</html>
